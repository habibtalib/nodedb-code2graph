name: Test

# Reusable test suite. Called by ci.yml (PR gate) and release.yml (pre-publish gate)
# so both run the exact same checks.
on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint, format & docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: lint
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Build docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features
      - name: Doctests
        run: cargo test --doc --all-features

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: test
      # The pyo3/napi cdylib crates are extension modules that cannot be linked
      # as cargo test binaries; they are built via maturin/napi in the `bindings`
      # job below. Everything else is tested across all three OSes.
      - name: Run tests
        run: cargo test --workspace --all-features --exclude code2graph-py --exclude code2graph-node

  bindings:
    name: Build bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: bindings
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build Python wheel (maturin)
        run: |
          pip install maturin
          maturin build --release -m bindings/python/Cargo.toml
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Build Node addon (napi)
        working-directory: bindings/node
        run: |
          npm ci
          npx napi build --release --platform
      # `napi build` regenerates index.js / index.d.ts from the #[napi] API.
      # They are committed (so the published package ships its loader), so a
      # change to the Rust binding API that wasn't regenerated leaves them stale.
      # Fail the gate if the just-built files differ from what's committed.
      - name: Verify committed napi bindings are in sync
        working-directory: bindings/node
        run: |
          if ! git diff --exit-code -- index.js index.d.ts; then
            echo "::error::bindings/node/index.js or index.d.ts is out of date — run 'npm run build' in bindings/node and commit the regenerated files."
            exit 1
          fi

  # Proves every language Cargo feature builds standalone (--no-default-features
  # plus exactly one language feature). --all-features in the `test` job above
  # can mask a feature-isolation bug (e.g. the pre-existing `luau` bug fixed in
  # Phase 1) since every language's deps are present simultaneously there. This
  # job is the only place that would catch such a break. `matrix.lang` is meant
  # to track Cargo.toml's `[features]` block 1:1 — every entry except
  # default/manifest/serde/_extractors — regenerate it from Cargo.toml (see
  # CONTRIBUTING.md) whenever a language feature is added or removed.
  feature-isolation:
    name: Feature isolation (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [rust, python, typescript, go, java, c, cpp, ruby, php, shell, swift,
               kotlin, solidity, sql, hcl, csharp, scala, dart, lua, luau, pascal, svelte,
               zig, julia, r, ocaml, objc, fortran, groovy, powershell, systemverilog,
               astro, fsharp, elixir, erlang, gleam, haskell]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: isolation-${{ matrix.lang }}
      - name: Build ${{ matrix.lang }} in isolation
        run: cargo check --no-default-features --features ${{ matrix.lang }}
